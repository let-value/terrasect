pluginManagement {
        repositories {
                maven { url = 'https://maven.fabricmc.net/' }
                maven { url = 'https://maven.neoforged.net/releases' }
                mavenCentral()
                gradlePluginPortal()
        }
}

rootProject.name = 'terrasect'

def excludedDirs = [
        '.git',
        '.github',
        '.gradle',
        '.idea',
        '.vscode',
        'build',
        'gradle',
        'logs',
        'minecraft',
        'mods',
        'versions'
]

rootDir.listFiles()
        .findAll { it.isDirectory() && !excludedDirs.contains(it.name) && file("${it.name}/build.gradle").isFile() }
        .sort { it.name }
        .each { include(it.name) }

file('versions').listFiles()
        ?.findAll { it.isDirectory() && !it.name.startsWith('.') }
        ?.sort { it.name }
        ?.each { versionDir ->
                def versionId = versionDir.name.replace('.', '_')
                versionDir.listFiles()
                        ?.findAll { it.isDirectory() && file("${it.absolutePath}/build.gradle").isFile() }
                        ?.each { loaderDir ->
                                def projectName = "${loaderDir.name}-${versionId}"
                                include(projectName)
                                project(":${projectName}").projectDir = loaderDir
                        }
        }
