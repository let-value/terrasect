pluginManagement {
    def loomVersion = providers.gradleProperty('fabric_loom_version').getOrElse('1.14.8')

    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven { url = 'https://maven.fabricmc.net/' }
        maven { url = 'https://maven.neoforged.net/releases' }
    }
    plugins {
        // ModDevGradle for common (vanilla mode) and neoforge modules
        id 'net.neoforged.moddev' version '2.0.133'
    }
}

def loomVersion = providers.gradleProperty('fabric_loom_version').getOrElse('1.14.8')

buildscript {
    def loomVersion = providers.gradleProperty('fabric_loom_version').getOrElse('1.14.8')

    repositories {
        mavenCentral()
        gradlePluginPortal()
        maven { url = 'https://maven.fabricmc.net/' }
        maven { url = 'https://maven.neoforged.net/releases' }
    }

    dependencies {
        classpath("net.fabricmc:fabric-loom:${loomVersion}")
    }
}

enableFeaturePreview('TYPESAFE_PROJECT_ACCESSORS')

rootProject.name = 'terrasect'
include('common', 'fabric', 'neoforge')

def versionsDir = file('versions')
if (versionsDir.exists()) {
    versionsDir.eachDir { mcVersionDir ->
        def mcVersion = mcVersionDir.name
        mcVersionDir.eachDir { moduleDir ->
            def moduleName = moduleDir.name 
            def buildGradle = new File(moduleDir, 'build.gradle')
            def buildGradleKts = new File(moduleDir, 'build.gradle.kts')
            
            if (buildGradle.exists() || buildGradleKts.exists()) {
                def safeVersion = mcVersion.replace('.', '_')
                def projectPath = ":mc${safeVersion}-${moduleName}"
                include(projectPath)
                project(projectPath).projectDir = moduleDir
            }
        }
    }
}
