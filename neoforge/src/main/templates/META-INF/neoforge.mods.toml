# This is an example neoforge.mods.toml file. It contains the data relating to the loading mods.
# The name of the mod loader type to load - for Kotlin mods it should be kotlinforforge
modLoader = "kotlinforforge" #mandatory

# A version range to match for said mod loader - for Kotlin this is currently 5.x
loaderVersion = "${neoforge_kotlin_version_range}" #mandatory

# The license for you mod. This is mandatory metadata.
license = "${mod_license}"

# A URL to refer people to when problems occur with this mod
#issueTrackerURL="https://change.me.to.your.issue.tracker.example.invalid/" #optional

# A list of mods - how many allowed here is determined by the individual mod loader
[[mods]] #mandatory

# The modid of the mod
modId = "${mod_id}" #mandatory

# The version number of the mod
version = "${mod_version}" #mandatory

# A display name for the mod
displayName = "${mod_name}" #mandatory

# A URL to query for updates for this mod
#updateJSONURL="https://change.me.example.invalid/updates.json" #optional

# A URL for the "homepage" for this mod, displayed in the mod UI
#displayURL="https://change.me.to.your.mods.homepage.example.invalid/" #optional

# A file name (in the root of the mod JAR) containing a logo for display
#logoFile="terrasect.png" #optional

# A text field displayed in the mod UI
#credits="" #optional

# The authors of the mod
authors = "${mod_authors}" #optional

# The description text for the mod (multi line!)
description = '''${mod_description}'''

[[mixins]]
config = "common.mixins.json"

[[mixins]]
config = "common.client.mixins.json"

# A dependency - use the . to indicate dependency for a specific modid
[[dependencies.${ mod_id }]] #optional
modId = "neoforge" #mandatory
type = "required" #mandatory
versionRange = "${neoforge_version_range}" #mandatory
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "minecraft"
type = "required"
versionRange = "${neoforge_minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "kotlinforforge"
type = "required"
versionRange = "${neoforge_kotlin_version_range}"
ordering = "NONE"
side = "BOTH"

