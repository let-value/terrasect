plugins {
    id 'java'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.133'
}

base {
    archivesName = property('archives_base_name')
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
}

neoForge {
    version = property('neoforge_version')
    
    mods {
        terrasect {
            sourceSet sourceSets.main
            sourceSet project(':common').sourceSets.main
        }
    }
    
    runs {
        client {
            client()
        }
        server {
            server()
        }
    }
}

dependencies {
    implementation project(':common')
}

jar {
    manifest {
        attributes([
                'Specification-Title'     : 'terrasect',
                'Specification-Vendor'    : 'terrasect',
                'Specification-Version'   : project.version,
                'Implementation-Title'    : project.name,
                'Implementation-Version'  : project.version,
                'Implementation-Vendor'   : 'terrasect'
        ])
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}

tasks.withType(ProcessResources).configureEach {
    filesMatching('META-INF/neoforge.mods.toml') {
        expand(rootProject.properties)
    }
}
