name: Pages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-modrinth:
    name: Sync description to Modrinth
    runs-on: ubuntu-latest
    # Best-effort: the token scoped for publish.yml's version uploads may not carry project-write
    # permission. Doesn't block anything else if it fails or the secrets aren't set.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: PATCH project description
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
        run: |
          if [ -z "$MODRINTH_TOKEN" ] || [ -z "$MODRINTH_PROJECT_ID" ]; then
            echo "MODRINTH_TOKEN/MODRINTH_PROJECT_ID not configured, skipping."
            exit 0
          fi
          # Modrinth's field names don't match the site's own labels: the short one-liner shown
          # under the title is "description" in the API, and the long Markdown body is "body".
          SHORT_DESCRIPTION=$(cat pages/content/summary.txt)
          BODY=$(cat pages/content/description.md)
          jq -n --arg description "$SHORT_DESCRIPTION" --arg body "$BODY" \
            '{description: $description, body: $body}' > payload.json
          STATUS=$(curl -s -o response.json -w '%{http_code}' -X PATCH \
            "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json)
          echo "HTTP status: $STATUS"
          cat response.json
          if [ "$STATUS" -ge 300 ]; then
            exit 1
          fi
