name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  TERRASECT_SKIP_COMPAT: "1"

jobs:
  build:
    name: Build and stage release jars
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          # Release runs are rare: read whatever cache the branches seeded, never write.
          cache-read-only: true

      - name: Build all loader jars
        run: >
          ./gradlew test
          :1.20.1-fabric:build
          :1.21.1-fabric:build :1.21.1-neoforge:build
          :1.21.11-fabric:build :1.21.11-neoforge:build
          :26.1.x-fabric:build :26.1.x-neoforge:build
          :26.2.x-fabric:build :26.2.x-neoforge:build

      - name: Stage jars
        run: |
          mkdir -p dist
          find versions/*-fabric/build/libs versions/*-neoforge/build/libs \
            -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' \
            -exec cp {} dist/ \;
          ls -l dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terrasect-jars
          path: dist/*.jar

      - name: Attach jars to draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MOD_VERSION=$(sed -n 's/^mod\.version = "\(.*\)"/\1/p' stonecutter.properties.toml)
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v${MOD_VERSION}"
          fi
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft \
              --title "Terrasect $MOD_VERSION" --generate-notes
          fi
          gh release upload "$TAG" dist/*.jar --repo "$GITHUB_REPOSITORY" --clobber
