plugins {
    id 'java'
    id 'net.neoforged.moddev' version '1.0.21'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

neoForge {
    version = neoforge_version
    
    parchment {
        mappingsVersion = parchment_version
        minecraftVersion = parchment_minecraft_version
    }
    
    runs {
        configureEach {
            systemProperty 'forge.logging.markers', ''
            systemProperty 'forge.logging.console.level', 'debug'
        }
        
        client {
            systemProperty 'neoforge.enabledGameTestNamespaces', mod_id
        }
        
        server {
            systemProperty 'neoforge.enabledGameTestNamespaces', mod_id
            programArgument '--nogui'
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'org.spongepowered:mixin:0.8.7'
    annotationProcessor 'org.spongepowered:mixin:0.8.7:processor'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ["-AoutRefMapFile=${layout.buildDirectory.file('generated/refmaps/terrasect.refmap.json').get().asFile.absolutePath}"]
    doFirst {
        layout.buildDirectory.dir('generated/refmaps').get().asFile.mkdirs()
    }
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neoforge_version: neoforge_version,
            neoforge_version_range: neoforge_version_range,
            javafml_version_range: javafml_version_range,
            mod_id: mod_id,
            mod_name: mod_name,
            mod_version: mod_version,
            mod_author: mod_author,
            mod_description: mod_description,
    ]
    
    inputs.properties replaceProperties
    
    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }

    from(layout.buildDirectory.dir('generated/refmaps')) {
        include 'terrasect.refmap.json'
    }

    dependsOn(tasks.named('compileJava'))
}
