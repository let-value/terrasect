import org.gradle.api.plugins.JavaPlugin
import org.gradle.api.plugins.JavaPluginExtension
import org.gradle.api.tasks.Sync
import org.gradle.jvm.toolchain.JavaLanguageVersion

plugins {
    id 'base'
}

allprojects {
    group = property('maven_group')
    version = property('mod_version')
}

subprojects {
    repositories {
        mavenCentral()
        maven { url = 'https://maven.fabricmc.net/' }
        maven { url = 'https://maven.neoforged.net/releases' }
    }

    plugins.withType(JavaPlugin).configureEach {
        extensions.configure(JavaPluginExtension) { ext ->
            def javaVersion = (rootProject.property('java_version') as String).toInteger()
            ext.toolchain {
                languageVersion = JavaLanguageVersion.of(javaVersion)
            }
            ext.withSourcesJar()
        }
    }
}

tasks.register('unpackMinecraft', Sync) {
    group = 'help'
    description = 'Downloads and unpacks the Minecraft sources into the minecraft directory.'

    dependsOn(':common:createMinecraftArtifacts')

    from {
        def mcVersion = rootProject.property('minecraft_version') as String
        def commonProject = project(':common')
        def artifactsDir = commonProject.layout.buildDirectory.dir('moddev/artifacts').get().asFile

        def sourcesJar = commonProject.fileTree(artifactsDir) {
            include("**/*${mcVersion}*-sources.jar")
        }.files.toList().sort { -it.lastModified() }.find()

        if (sourcesJar == null) {
            throw new GradleException("Unable to locate Minecraft sources jar for ${mcVersion} in ${artifactsDir}")
        }

        zipTree(sourcesJar)
    }

    into(layout.projectDirectory.dir('minecraft'))
}
