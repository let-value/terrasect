plugins {
    id 'java'
    id 'net.neoforged.moddev' version "${moddev_version}"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(rootProject.property('java_version'))
    withSourcesJar()
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.neoforged.net/releases' }
}

neoForge {
    // Vanilla-mode: provide a Minecraft compile classpath without any loader.
    neoFormVersion = property('neoform_version')

    // Expose Minecraft classes to the test source set
    addModdingDependenciesTo sourceSets.test
}

dependencies {
    compileOnly 'org.slf4j:slf4j-api:2.0.16'
    compileOnly 'org.jetbrains:annotations:24.1.0'

    testImplementation platform('org.junit:junit-bom:5.10.3')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation "de.skuzzle.test:snapshot-tests-junit5:${rootProject.property('snapshot_tests_version')}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }
test { useJUnitPlatform() }
