plugins {
    id 'java'
    id 'net.fabricmc.fabric-loom' version "${fabric_loom_version}"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(rootProject.property('java_version'))
    withSourcesJar()
}

repositories {
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${rootProject.property('minecraft_version')}"
    
    compileOnly 'org.slf4j:slf4j-api:2.0.16'
    compileOnly 'org.jetbrains:annotations:24.1.0'

    testImplementation platform('org.junit:junit-bom:5.10.3')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation "de.skuzzle.test:snapshot-tests-junit5:${rootProject.property('snapshot_tests_version')}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }
test { useJUnitPlatform() }
