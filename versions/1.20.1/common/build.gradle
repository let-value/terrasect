plugins {
    id 'java'
    id 'fabric-loom'
}

// Apply shared utilities
apply from: rootProject.file('gradle/versioned-utils.gradle')

def baseProjectPath = prop('base_project', ':mc1_21_1-common')

// Ensure the base project is configured before we inspect its inheritance data
if (baseProjectPath) {
    evaluationDependsOn(baseProjectPath)
}

// Configure source inheritance
def baseProject = rootProject.findProject(baseProjectPath)

if (baseProject != null) {
    def ctx = buildVersionedInheritanceContext(baseProject, [
        rootProjects : [':common'],
        sourceLayouts: [
            main: ['java', 'resources'],
            test: ['java', 'resources']
        ]
    ])

    def inheritanceChain = ctx.inheritanceChain

    def localMainJavaFiles = ctx.localFiles['main:java']
    def localMainResourceFiles = ctx.localFiles['main:resources']
    def localTestJavaFiles = ctx.localFiles['test:java']
    def localTestResourceFiles = ctx.localFiles['test:resources']

    def inheritedMainJavaExcludes = ctx.inheritedExcludes['main:java']
    def inheritedMainResourceExcludes = ctx.inheritedExcludes['main:resources']
    def inheritedTestJavaExcludes = ctx.inheritedExcludes['test:java']
    def inheritedTestResourceExcludes = ctx.inheritedExcludes['test:resources']

    def manualMainJavaExcludes = ctx.manualExcludes['main:java']
    def manualTestJavaExcludes = ctx.manualExcludes['test:java']

    sourceSets {
        main {
            java {
                if (ctx.localDirs['main:java'].exists()) { srcDir ctx.localDirs['main:java'] }
                addInheritedSourceDirs(delegate, inheritanceChain, 'main', 'java', localMainJavaFiles, inheritedMainJavaExcludes)
            }
            resources {
                if (ctx.localDirs['main:resources'].exists()) { srcDir ctx.localDirs['main:resources'] }
                addInheritedSourceDirs(delegate, inheritanceChain, 'main', 'resources', localMainResourceFiles, inheritedMainResourceExcludes)
            }
        }
        test {
            java {
                if (ctx.localDirs['test:java'].exists()) { srcDir ctx.localDirs['test:java'] }
                addInheritedSourceDirs(delegate, inheritanceChain, 'test', 'java', localTestJavaFiles, inheritedTestJavaExcludes)
            }
            resources {
                if (ctx.localDirs['test:resources'].exists()) { srcDir ctx.localDirs['test:resources'] }
                addInheritedSourceDirs(delegate, inheritanceChain, 'test', 'resources', localTestResourceFiles, inheritedTestResourceExcludes)
            }
        }
    }

    configureCompileExclusions('compileJava', manualMainJavaExcludes, '/common/src/')
    configureCompileExclusions('compileTestJava', manualTestJavaExcludes, '/common/src/')
}

dependencies {
    minecraft "com.mojang:minecraft:${prop('minecraft_version')}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${prop('fabric_loader_version')}"
    
    compileOnly('org.slf4j:slf4j-api')
    implementation('org.jetbrains:annotations:24.1.0')

    testImplementation(platform('org.junit:junit-bom:5.10.3'))
    testImplementation('org.junit.jupiter:junit-jupiter')
    testRuntimeOnly('org.junit.platform:junit-platform-launcher')
}

repositories {
    maven { url = 'https://maven.fabricmc.net/' }
    mavenCentral()
}

test {
    useJUnitPlatform()
}
