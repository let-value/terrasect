plugins {
    id 'java'
    id 'fabric-loom' version "${fabric_loom_version}"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(rootProject.property('java_version'))
    withSourcesJar()
}

repositories {
    mavenCentral()
    exclusiveContent {
        forRepository { maven { url = 'https://api.modrinth.com/maven' } }
        filter { includeGroup 'maven.modrinth' }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${rootProject.property('minecraft_version')}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${property('fabric_loader_version')}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${property('fabric_api_version')}"

    implementation project(':common')

    modLocalRuntime 'maven.modrinth:fabric-permissions-api:0.6.1'
    modLocalRuntime 'maven.modrinth:spark:1.10.156-fabric'

    compileOnly 'org.jetbrains:annotations:24.1.0'

    testImplementation platform('org.junit:junit-bom:5.10.3')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation "net.fabricmc:fabric-loader-junit:${property('fabric_loader_version')}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }
test { useJUnitPlatform() }

loom {
    splitEnvironmentSourceSets()
    accessWidenerPath = file('src/main/resources/terrasect.accesswidener')
    mods {
        create('terrasect') {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
    runs {
        client { ideConfigGenerated true; runDir 'runs/fabric-client'; client() }
        server { ideConfigGenerated true; runDir 'runs/fabric-server'; server() }
    }
}

fabricApi {
    configureTests {
        createSourceSet = false
        enableGameTests = false
        enableClientGameTests = true
        eula = true
    }
}

processResources {
    def expandProps = [
        version              : rootProject.property('mod_version'),
        minecraft_version    : rootProject.property('minecraft_version'),
        java_version         : rootProject.property('java_version'),
        fabric_loader_version: project.property('fabric_loader_version')
    ]
    inputs.properties(expandProps)
    filesMatching('fabric.mod.json') { expand(expandProps) }
}
