plugins {
    id 'fabric-loom'
}

dependencies {
    minecraft "com.mojang:minecraft:${property('minecraft_version')}"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:${property('fabric_loader_version')}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${property('fabric_api_version')}"
    
    // Client GameTest API - required for client-side game tests with TestWorldBuilder
    modImplementation fabricApi.module("fabric-client-gametest-api-v1", property('fabric_api_version'))

    implementation project(':common')

    modLocalRuntime "maven.modrinth:fabric-permissions-api:0.6.1"
    modLocalRuntime "maven.modrinth:spark:1.10.156-fabric"

    testImplementation(platform('org.junit:junit-bom:5.10.3'))
    testImplementation('org.junit.jupiter:junit-jupiter')
    // Fabric Loader JUnit for unit tests
    testImplementation "net.fabricmc:fabric-loader-junit:${property('fabric_loader_version')}"
}

loom {
    splitEnvironmentSourceSets()
    accessWidenerPath = file("src/main/resources/terrasect.accesswidener")
    mods {
        create('terrasect') {
            sourceSet(sourceSets.main)
            sourceSet(sourceSets.client)
            sourceSet(project(':common').sourceSets.main)
        }
    }
    runs {
        client {
            ideConfigGenerated true
            runDir "runs/fabric-client"
            client()
        }
        server {
            ideConfigGenerated true
            runDir "runs/fabric-server"
            server()
        }
    }
}

// Configure Fabric API game tests (both server and client)

fabricApi {
    configureTests {
        // Use main source set for tests (not a separate test source set)
        createSourceSet = false
        enableGameTests = false
        enableClientGameTests = true
        eula = true
    }
}

test {
    useJUnitPlatform {
        // Exclude slow visualization tests by default
        excludeTags 'slow'
    }
}

processResources {
    inputs.properties([
        version: project.version,
        minecraft_version: project.property('minecraft_version'),
        fabric_loader_version: project.property('fabric_loader_version'),
        java_version: project.property('java_version')
    ])
    filesMatching("fabric.mod.json") {
        expand([
            version: project.version,
            minecraft_version: project.property('minecraft_version'),
            fabric_loader_version: project.property('fabric_loader_version'),
            java_version: project.property('java_version')
        ])
    }
}

repositories {
    maven { url = 'https://maven.fabricmc.net/' }
    mavenCentral()
    
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}
